            - textbox [active] [ref=e218]:
              - paragraph [ref=e219]:
                - text: "收到。这是一份为您精心策划的 **浴室安全扶手（40cm 一对装）** 葡萄牙语电商详情页设计方案。 作为资深电商设计师，我将整体风格定位于 **“医疗级专业感”与“现代家居美学”** 的结合。色彩方案建议使用：**深灰色/藏青色（信任感）+ 纯白色（洁净感）+ 极简金属拉丝纹理**。 --- ### **设计指南总览** * **比例：** 1:1 * **语言：** 葡萄牙语 (Português) * **核心关键词：** Segurança (安全), Durabilidade (耐用), Ergonomia (人体工程学) --- ### **详情页 10 屏方案策划** #### **第一屏：首屏封面 (Hero Page)** * **主标题：** Par de Barras de Apoio de Segurança (40cm) * **副标题：** Proteção de nível médico para sua família. Aço inoxidável 304 com design antiderrapante. * **信息布局：** 45度斜角展示一对产品，强调金属光泽与黑色防滑抓手的对比。 * **排版形式：** 居中排版，标题采用加粗无衬线字体，下方放置三个核心图标：SUS 304、Antiderrapante（防滑）、Super Resistente（超强承重）。 #### **第二屏：场景代入 (Emotional Connection)** * **主标题：** Segurança e Cuidado para Quem Você Ama * **副标题：** Evite quedas e acidentes no banheiro. Ideal para idosos, crianças e pessoas com mobilidade reduzida. * **信息布局：** 背景为高亮洁净的现代浴室，产品安装在马桶旁或淋浴区。 * **排版形式：** 左文右图。文字部分使用优雅的细体，强调“守护父母”的温情氛围。 #### **第三屏：材质解析 (Material Excellence)** * **主标题：** Aço Inoxidável SUS 304 de Alta Qualidade * **副标题：** Resistente à corrosão, ferrugem e umidade. Tubo espessado de 32mm para máxima estabilidade. * **信息布局：** 产品爆炸图或局部特写，展示不锈钢管径切面。 * **排版形式：** 极简主义排版。利用射线引出参数标注（32mm, 0.6mm thickness），体现工业级精密感。 #### **第四屏：防滑核心 (Anti-slip Tech)** * **主标题：** Textura Antiderrapante de Nova Geração * **副标题：** Grânulos de 0.6mm que oferecem aderência total, mesmo com as mãos ensaboadas. * **信息布局：** 黑色抓手部分的超近距离微距摄影，清晰展示防滑颗粒。 * **排版形式：** 左右对比或局部放大圆圈，文字环绕在颗粒特写周围。 #### **第五屏：底座革新 (Base Design Upgrade)** * **主标题：** Base de Fixação Triangular Reforçada * **副标题：** Mais estável que a base tradicional de 4 furos. Distribuição de força uniforme e segura. * **信息布局：** 展示三孔底座的特写，背景衬托物理受力三角形分析线。 * **排版形式：** 结构化排版。左侧标注“Upgrade: Sistema de 3 furos”，右侧展示力学原理简图。 #### **第六屏：人体工程学 (Ergonomic Grip)** * **主标题：** Design Ergonômico de 25mm de Diâmetro * **副标题：** O ajuste perfeito para as mãos, garantindo um toque confortável e seguro. * **信息布局：** 展示手握住扶手的侧面视图，标注握感弧度。 * **排版形式：** 留白设计。标题置于顶部，产品图居中，利用半透明色块标注“Pegada Confortável”。 #### **第七屏：瓷砖保护与安装优势 (Tile Protection)** * **主标题：** Instalação Fácil Sem Danificar o Azulejo * **副标题：** Perfuração precisa que reduz o risco de quebrar cerâmicas durante a montagem. * **信息布局：** 产品安装在精美瓷砖墙面的侧视图。 * **排版形式：** 采用分栏对比。重点突出“Praticidade”与“Segurança na Instalação”。 #### **第八屏：安装步骤图解 (Step-by-Step Guide)** * **主标题：** Guia de Instalação Simples * **副标题：** 6 passos rápidos para uma fixação firme e duradoura. * **信息布局：** 1-6 数字序号配合对应的线性图标或实拍小图。1. Marcar -> 2. Perfurar (6mm) -> 3. Inserir bucha -> 4. Parafusar -> 5. Capa decorativa -> 6. Concluído. * **排版形式：** 网格布局 (2x3)，步骤清晰，色调统一。 #### **第九屏：规格参数表 (Technical Specifications)** * **主标题：** Especificações do Produto * **副标题：** Tudo o que você precisa saber sobre o seu suporte de segurança. * **信息布局：** Material: SUS 304 / Cor: Brilhante / Diâmetro: 32mm / Comprimento: 40cm / Instalação: Perfuração. * **排版形式：** 现代简约表格。左右分栏，左侧为带尺寸标注的产品三视图，右侧为文字参数列表。 #### **第十屏：品牌承诺/全景展示 (Brand Promise)** * **主标题：** Compromisso com a Sua Segurança * **副标题：** Durabilidade profissional para ambientes residenciais e públicos. O par perfeito para seu banheiro. * **信息布局：** 两支扶手整齐排列的全景图，光影处理高级，带金属高光。 * **排版形式：** 视觉收尾，下方放置小型图标：Eco-friendly, Recyclable, High Quality. --- ### **设计建议：** 1. **字体选择：** 建议使用 Montserrat 或 Roboto，这两种字体在葡萄牙语环境下显得专业且易读。 2. **材质表现：** 在生成素材时，务必强调 SUS 304 的镜面反射效果，这直接决定了“高级感”。 3. **色彩呼应：** 扶手的黑色防滑部分可以与页面中的深色背景块呼应，增加视觉一致性。"
