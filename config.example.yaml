excel:
  path: "data\\products.xlsx"
  sheet: 0
  columns:
    id: "A"
    name_cn: "B"
    image_size: "C"
    language: "D"
    selling_points: "E"
    # Fill 是/否. 是 = later reference images are the same product/spec/color/style.
    reference_images_are_product: "I"
  image_columns:
    start: "F"
    # Optional: stop at a fixed column.
    # end: "J"
    # Optional: scan at most N columns from start if end is not set.
    max_columns: 20
    # Optional: stop after N consecutive empty image cells if neither end nor max_columns stops first.
    empty_streak: 20

browser:
  # Optional. Leave empty to auto-detect Chrome/Edge or use Playwright's bundled Chromium.
  chrome_exe: ""
  user_data_dir: "browser_profile"
  network_attempts: 5
  page_ready_timeout: 90
  product_attempts: 2
  retry_delays: [3, 6, 12, 20]

gemini:
  preamble_file: "preamble.txt"
  base_url: "https://gemini.google.com"
  thinking_mode: true
  reply_timeout: 300
  upload_timeout: 120
  upload_attempts: 3

gemini_api:
  # Set GEMINI_API_KEY in your environment.
  base_url: "https://generativelanguage.googleapis.com/v1beta"
  model: gemini-2.5-flash-lite

nvidia_api:
  # Set NVIDIA_API_KEY in your environment or .env.
  base_url: "https://integrate.api.nvidia.com/v1"
  model: moonshotai/kimi-k2.5
  # The fields below are retained only to support legacy configurations.
  # New configurations should select the direct model field above.
  model_choice: "kimi"
  send_images: true
  models:
    # Kimi K2.5 supports image input and thinking mode by default.
    kimi: "moonshotai/kimi-k2.5"

prompt_settings:
  detail_page_count: 12
  design_style: "温馨感、高级感"
  required_sections: ["主标题", "副标题", "信息布局", "排版形式"]
  image_quality: "1K"
  logo_policy: "不出现 Logo"
  copy_style: "适合跨境电商，具体、不空泛"
  copy_detail_level: "详细"
  product_fidelity: "严格还原"
  white_background_requirements: "白底、超清摄影、突出高级感，产品造型与原图一致"
  scene_requirements: "重新设计场景，产品特征与原图保持一致，超清摄影"
  allow_questions: false
  default_language: "巴西葡萄牙语"
  missing_image_size_policy: "不使用默认固定图片比例"
  extra_requirements: ""

lovart:
  # Set LOVART_ACCESS_KEY and LOVART_SECRET_KEY in your environment.
  base_url: "https://lgw.lovart.ai"
  # image_model options:
  # auto, gpt_image_2, nano_banana, nano_banana_2, nano_banana_pro,
  # midjourney, seedream_v4, seedream_v4_5
  # Multiple models are allowed with commas, e.g. "nano_banana_2,nano_banana_pro".
  image_model: "auto"
  # prefer = let Lovart Agent auto-plan but prefer this image model.
  # force = force only this image generation tool.
  model_selection: "prefer"
  # Optional: fast or thinking. Empty/default lets Lovart choose its default.
  reasoning_mode: "fast"
  # In unlimited mode, if Lovart shows a credits confirmation, do not confirm it.
  # The automation records needs_manual_action and continues with the next product.
  max_confirmation_rounds: 5
  max_auto_confirm_credits: 10
  wait_timeout: 10800
  poll_interval: 10
  timeout: 600
  upload_attempts: 3
  upload_retry_delay: 2
